# Fly.io config for dexkepo API.
# Deploy from repo root: `fly deploy -c api/fly.toml`
# First time: `fly launch --no-deploy --copy-config -c api/fly.toml --name dexkepo-api`
# then `fly secrets set DATABASE_URL=... JWT_SECRET=... JWT_EXPIRES_IN=7d`
# then `fly deploy -c api/fly.toml`

app = "dexkepo-api"
primary_region = "cdg"           # Paris — change if you want a region closer to Neon (eu-central-1 = fra)
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "api/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
